<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password - 7th Trade Hub</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#16a34a",
                        "background-light": "#f8f6f6",
                        "background-dark": "#0f172a",
                        "card-dark": "#1e293b",
                        "border-dark": "#334155"
                    },
                    fontFamily: {
                        "display": ["Public Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Public Sans', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<!-- Navigation Header -->
<header class="flex items-center justify-between border-b border-slate-200 dark:border-border-dark px-6 py-4 md:px-20 lg:px-40 bg-background-light dark:bg-background-dark">
<div class="flex items-center gap-3">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-2xl">account_balance_wallet</span>
</div>
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight tracking-tight">7th Trade Hub</h2>
</div>
<div class="flex items-center gap-4">
<button class="flex items-center justify-center rounded-xl h-10 w-10 bg-slate-200 dark:bg-card-dark text-slate-600 dark:text-slate-300 hover:bg-slate-300 dark:hover:bg-slate-700 transition-colors">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex items-center justify-center p-6">
<div class="w-full max-w-[480px] space-y-8">
<!-- Branding & Title -->
<div class="flex flex-col gap-4 text-center md:text-left">
<div class="inline-flex items-center justify-center md:justify-start">
<span class="material-symbols-outlined text-primary text-5xl">lock_reset</span>
</div>
<div class="space-y-2">
<h1 class="text-slate-900 dark:text-white text-4xl font-extrabold tracking-tight">Forgot Password</h1>
<p class="text-slate-500 dark:text-slate-400 text-lg leading-relaxed">
                                Enter your email to receive a password reset link. We'll help you get back into your trade hub.
                            </p>
</div>
</div>
<!-- Reset Form Card -->
<div class="bg-white dark:bg-card-dark p-8 rounded-xl shadow-xl border border-slate-200 dark:border-border-dark">
<form class="space-y-6" onsubmit="return false;">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-200 text-sm font-semibold uppercase tracking-wider" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-slate-400 text-xl">mail</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 rounded-xl border border-slate-200 dark:border-border-dark bg-slate-50 dark:bg-slate-900/50 text-slate-900 dark:text-white placeholder-slate-400 focus:ring-2 focus:ring-primary focus:border-primary transition-all" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<button class="w-full flex items-center justify-center gap-2 rounded-xl bg-primary hover:bg-primary/90 text-white h-14 text-base font-bold transition-all shadow-lg shadow-primary/20" type="submit">
<span>Send Reset Link</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</form>
</div>
<!-- Footer Link -->
<div class="text-center">
<a class="inline-flex items-center gap-2 text-primary hover:text-primary/80 font-semibold transition-colors group" href="#">
<span class="material-symbols-outlined text-lg group-hover:-translate-x-1 transition-transform">arrow_back</span>
<span>Back to Login</span>
</a>
</div>
<!-- Security Badge -->
<div class="pt-8 flex items-center justify-center gap-2 text-slate-400 text-xs font-medium uppercase tracking-widest">
<span class="material-symbols-outlined text-sm">verified_user</span>
<span>Secured by 7th Trade encryption</span>
</div>
</div>
</main>
<!-- Page Footer Background Element (Abstract) -->
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/50 to-transparent opacity-30"></div>
</div>
</div>
</body></html>
