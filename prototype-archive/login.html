<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>7th Trade Hub - Authentication</title>
<!-- Tailwind CSS CDN with plugins -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts: Inter -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0F172A', // Dark theme background
            accent: '#16A34A',  // Accent green
            glass: 'rgba(30, 41, 59, 0.7)',
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
        }
      }
    }
  </script>
<!-- BEGIN: Custom Styles -->
<style data-purpose="glassmorphism">
    .glass-card {
      background: rgba(30, 41, 59, 0.6);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .auth-transition {
      transition: all 0.3s ease-in-out;
    }
    .hidden-section {
      display: none;
    }
  </style>
<style data-purpose="base-layout">
    body {
      background-color: #0F172A;
      background-image: radial-gradient(circle at top right, rgba(22, 163, 74, 0.1), transparent),
                        radial-gradient(circle at bottom left, rgba(22, 163, 74, 0.05), transparent);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
<!-- END: Custom Styles -->
</head>
<body class="p-4 sm:p-8">
<!-- BEGIN: Authentication Container -->
<main class="w-full max-w-md mx-auto" data-purpose="auth-wrapper">
<!-- Branding Header -->
<div class="text-center mb-8" data-purpose="branding">
<h1 class="text-3xl font-bold text-white tracking-tight">7th Trade Hub</h1>
<p class="text-slate-400 mt-2">Connecting markets, empowering traders.</p>
</div>
<!-- BEGIN: Login Section -->
<section class="glass-card rounded-2xl p-8 shadow-2xl auth-transition" data-purpose="login-form-container" id="login-section">
<header class="mb-8">
<h2 class="text-2xl font-semibold text-white">Welcome Back</h2>
<p class="text-slate-400 text-sm">Please enter your details to sign in.</p>
</header>
<form action="#" class="space-y-5" method="POST">
<!-- Email/Username Input -->
<div>
<label class="block text-sm font-medium text-slate-300 mb-1.5" for="login-identifier">Email or Username</label>
<input class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none" id="login-identifier" name="identifier" placeholder="johndoe@example.com" required="" type="text"/>
</div>
<!-- Password Input -->
<div>
<label class="block text-sm font-medium text-slate-300 mb-1.5" for="login-password">Password</label>
<input class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:ring-2 focus:ring-accent focus:border-transparent transition-all outline-none" id="login-password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Remember & Forgot Password -->
<div class="flex items-center justify-between text-sm">
<label class="flex items-center cursor-pointer group">
<input class="rounded border-slate-700 bg-slate-800 text-accent focus:ring-accent focus:ring-offset-slate-900" type="checkbox"/>
<span class="ml-2 text-slate-400 group-hover:text-slate-300 transition-colors">Remember me</span>
</label>
<a class="text-accent hover:text-green-400 font-medium transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-accent hover:bg-green-700 text-white font-semibold py-3 rounded-lg shadow-lg shadow-green-900/20 transition-all transform hover:-translate-y-0.5 active:scale-[0.98]" type="submit">
          Login
        </button>
</form>
<footer class="mt-8 pt-6 border-t border-slate-700/50 text-center">
<p class="text-slate-400 text-sm">
          Don't have an account? 
          <button class="text-accent hover:text-green-400 font-semibold transition-colors" onclick="toggleAuth('signup')">Create Account</button>
</p>
</footer>
</section>
<!-- END: Login Section -->
<!-- BEGIN: Sign Up Section -->
<section class="glass-card rounded-2xl p-8 shadow-2xl auth-transition hidden-section" data-purpose="signup-form-container" id="signup-section">
<header class="mb-6">
<h2 class="text-2xl font-semibold text-white">Join the Hub</h2>
<p class="text-slate-400 text-sm">Get started with your free account today.</p>
</header>
<form action="#" class="space-y-4" method="POST">
<!-- Full Name -->
<div>
<label class="block text-sm font-medium text-slate-300 mb-1.5" for="signup-fullname">Full Name</label>
<input class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:ring-2 focus:ring-accent focus:border-transparent outline-none" id="signup-fullname" name="fullname" placeholder="John Doe" required="" type="text"/>
</div>
<!-- Grid for Email and Username -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div>
<label class="block text-sm font-medium text-slate-300 mb-1.5" for="signup-email">Email</label>
<input class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:ring-2 focus:ring-accent focus:border-transparent outline-none" id="signup-email" name="email" placeholder="john@example.com" required="" type="email"/>
</div>
<div>
<label class="block text-sm font-medium text-slate-300 mb-1.5" for="signup-username">Username</label>
<input class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:ring-2 focus:ring-accent focus:border-transparent outline-none" id="signup-username" name="username" placeholder="johndoe7" required="" type="text"/>
</div>
</div>
<!-- Password -->
<div>
<label class="block text-sm font-medium text-slate-300 mb-1.5" for="signup-password">Password</label>
<input class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:ring-2 focus:ring-accent focus:border-transparent outline-none" id="signup-password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Confirm Password -->
<div>
<label class="block text-sm font-medium text-slate-300 mb-1.5" for="signup-confirm">Confirm Password</label>
<input class="w-full bg-slate-800/50 border border-slate-700 rounded-lg px-4 py-2.5 text-white placeholder-slate-500 focus:ring-2 focus:ring-accent focus:border-transparent outline-none" id="signup-confirm" name="confirm-password" placeholder="••••••••" required="" type="password"/>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start">
<div class="flex items-center h-5">
<input class="rounded border-slate-700 bg-slate-800 text-accent focus:ring-accent focus:ring-offset-slate-900 h-4 w-4" id="terms" name="terms" required="" type="checkbox"/>
</div>
<div class="ml-3 text-sm">
<label class="text-slate-400" for="terms">
              I agree to the <a class="text-accent hover:underline" href="#">Terms of Service</a> and <a class="text-accent hover:underline" href="#">Privacy Policy</a>.
            </label>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-accent hover:bg-green-700 text-white font-semibold py-3 rounded-lg shadow-lg shadow-green-900/20 transition-all transform hover:-translate-y-0.5 active:scale-[0.98]" type="submit">
          Create Account
        </button>
</form>
<footer class="mt-6 pt-6 border-t border-slate-700/50 text-center">
<p class="text-slate-400 text-sm">
          Already have an account? 
          <button class="text-accent hover:text-green-400 font-semibold transition-colors" onclick="toggleAuth('login')">Login Here</button>
</p>
</footer>
</section>
<!-- END: Sign Up Section -->
</main>
<!-- END: Authentication Container -->
<!-- BEGIN: Navigation Logic -->
<script data-purpose="toggle-handler">
    /**
     * Toggles between the Login and Sign Up views
     * @param {string} view - 'login' or 'signup'
     */
    function toggleAuth(view) {
      const loginSection = document.getElementById('login-section');
      const signupSection = document.getElementById('signup-section');

      if (view === 'signup') {
        loginSection.classList.add('hidden-section');
        signupSection.classList.remove('hidden-section');
      } else {
        signupSection.classList.add('hidden-section');
        loginSection.classList.remove('hidden-section');
      }
    }
  </script>
<!-- END: Navigation Logic -->
</body></html>
